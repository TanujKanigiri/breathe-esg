services:
  - type: web
    name: breathe-esg-backend
    runtime: python

    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build && cd .. && python manage.py collectstatic --noinput && python manage.py migrate"

    startCommand: "gunicorn config.wsgi:application"

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: PYTHON_VERSION
        value: 3.11.0